<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Polyglot Index</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/fengari-web/dist/fengari-web.js"></script>
</head>

<body>
  <h1>Polyglot Web Index</h1>

  <button id="symfony">Symfony</button>
  <button id="lua">Lua</button>
  <button id="scala">Scala</button>

  <pre id="output"></pre>

  <script>
    $("#symfony").click(async () => {
      let r = await fetch("http://localhost:8000/api/hello");
      $("#output").text(JSON.stringify(await r.json(), null, 2));
    });

    $("#lua").click(async () => {
      let r = await fetch("http://localhost:8081/lua/hello");
      $("#output").text(JSON.stringify(await r.json(), null, 2));
    });

    $("#scala").click(async () => {
      let r = await fetch("http://localhost:9000/scala/hello");
      $("#output").text(JSON.stringify(await r.json(), null, 2));
    });
  </script>

  <script type="application/lua">
    local js = require("js")
    js.global.document:getElementById("output").innerHTML =
      "Lua (Fengari) ready."
  </script>
</body>
</html>
